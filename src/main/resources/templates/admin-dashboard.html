<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Admin Dashboard — CareerFlow')}">
<body>
<div th:fragment="content">
<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-title">Admin Panel</div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/admin/dashboard}" class="active"><span class="nav-icon">📊</span>Overview</a></li>
            <li><a th:href="@{/admin/users}"><span class="nav-icon">👥</span>Manage Users</a></li>
            <li><a th:href="@{/admin/jobs}"><span class="nav-icon">💼</span>Manage Jobs</a></li>
        </ul>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <div><h1>Platform Analytics</h1><p>Real-time overview of platform performance.</p></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card stat-violet">
                <div class="stat-icon">🎓</div>
                <div class="stat-value" th:text="${totalStudents}">0</div>
                <div class="stat-label">Students</div>
            </div>
            <div class="stat-card stat-cyan">
                <div class="stat-icon">🏢</div>
                <div class="stat-value" th:text="${totalEmployers}">0</div>
                <div class="stat-label">Employers</div>
            </div>
            <div class="stat-card stat-green">
                <div class="stat-icon">💼</div>
                <div class="stat-value" th:text="${totalJobs}">0</div>
                <div class="stat-label">Active Jobs</div>
            </div>
            <div class="stat-card stat-amber">
                <div class="stat-icon">📋</div>
                <div class="stat-value" th:text="${totalApplications}">0</div>
                <div class="stat-label">Applications</div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h3>Shortlisting Rate</h3>
                <span class="badge badge-shortlisted"
                      th:text="${totalApplications > 0 ? #numbers.formatDecimal(shortlistedCount * 100.0 / totalApplications,1,'POINT',1,'POINT') + '%' : '0%'}">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill"
                     th:style="'width:' + (${totalApplications} > 0 ? (${shortlistedCount} * 100 / ${totalApplications}) : 0) + '%'"></div>
            </div>
            <p class="text-muted text-sm mt-1"
               th:text="${shortlistedCount} + ' candidates shortlisted out of ' + ${totalApplications} + ' applications.'"></p>
        </div>

        <div style="display:flex;gap:1rem;margin-top:2rem;flex-wrap:wrap;">
            <a th:href="@{/admin/users}" class="btn btn-outline">👥 View All Users →</a>
            <a th:href="@{/admin/jobs}"  class="btn btn-outline">💼 View All Jobs →</a>
        </div>
    </main>
</div>
</div>
</body>
</html>
