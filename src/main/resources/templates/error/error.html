<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Error - CareerFlow')}">
<body>
    <div th:fragment="content" style="text-align: center; padding: 10rem 1rem;">
        <h1 style="font-size: 5rem; color: var(--danger);">Oops!</h1>
        <h2 th:text="${error != null ? error : 'Something went wrong.'}">An error occurred.</h2>
        <p style="color: var(--text-muted); margin-top: 1rem;">We're sorry for the inconvenience. Please try again later or contact support.</p>
        <a th:href="@{/}" class="btn btn-primary" style="margin-top: 2rem;">Back to Home</a>
    </div>
</body>
</html>
