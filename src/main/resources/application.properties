# ─── Server ──────────────────────────────────────────────
server.port=8080

# ─── H2 In-Memory Database ───────────────────────────────
spring.datasource.url=jdbc:h2:mem:jobportaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Web Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── File Upload ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads

# ─── Mail (DISABLED — prevents startup failure) ──────────
# Mail auto-config is excluded so the app starts without SMTP credentials.
# To enable email notifications, set real credentials below and
# remove the autoconfigure.exclude line.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@gmail.com
#spring.mail.password=your-app-password
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

# ─── Thymeleaf ───────────────────────────────────────────
spring.thymeleaf.cache=false

# ─── Logging ─────────────────────────────────────────────
logging.level.com.jobportal=INFO
logging.level.org.springframework.security=WARN
logging.file.name=./app.log
