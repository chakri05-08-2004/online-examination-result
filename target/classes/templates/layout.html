<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, title)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">CareerFlow — Find Your Dream Job</title>
    <meta name="description" content="CareerFlow connects ambitious job seekers with top employers. Browse hundreds of open positions today.">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons (no API key needed) -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" type="module"></script>
</head>
<body>

    <nav>
        <a th:href="@{/}" class="logo">
            <span class="logo-icon">⚡</span> CareerFlow
        </a>
        <ul class="nav-links">
            <li><a th:href="@{/jobs}">Browse Jobs</a></li>

            <!-- Authenticated links -->
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/dashboard}">Dashboard</a>
            </li>

            <!-- Anonymous links -->
            <li sec:authorize="isAnonymous()">
                <a th:href="@{/login}">Sign In</a>
            </li>
            <li sec:authorize="isAnonymous()">
                <a th:href="@{/register}" class="btn btn-primary btn-sm">Get Started</a>
            </li>

            <!-- Logout -->
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/logout}" class="btn btn-outline btn-sm">Logout</a>
            </li>
        </ul>
    </nav>

    <div th:replace="${content}"></div>

    <footer>
        <p>© 2024 <span>CareerFlow</span> — Built with Spring Boot &amp; Thymeleaf. All rights reserved.</p>
    </footer>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
