<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Browse Jobs — CareerFlow')}">
<body>
<div th:fragment="content">

    <!-- Page header banner -->
    <div style="background: linear-gradient(135deg, rgba(99,102,241,.12), rgba(6,182,212,.08));
                border-bottom: 1px solid var(--border);
                padding: 3rem 5% 2.5rem; text-align: center;">
        <h1 style="font-size: 2.25rem; margin-bottom: .5rem;">
            Explore <span class="gradient-text">Opportunities</span>
        </h1>
        <p class="text-muted">Find the perfect role that matches your skills and passion.</p>
    </div>

    <div class="two-col" style="align-items: start;">

        <!-- ── FILTER SIDEBAR ── -->
        <aside>
            <div class="filter-card">
                <h3>🔍 Filter Jobs</h3>
                <form th:action="@{/jobs}" method="get">

                    <div class="form-group">
                        <label class="form-label" for="filter-category">Category</label>
                        <select id="filter-category" name="category" class="form-control">
                            <option value="">All Categories</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Design">Design</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Customer Support">Customer Support</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="filter-location">Location</label>
                        <input id="filter-location" type="text" name="location"
                               class="form-control" placeholder="City or Remote">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="filter-experience">Experience</label>
                        <select id="filter-experience" name="experience" class="form-control">
                            <option value="">Any Level</option>
                            <option value="Entry Level">Entry Level</option>
                            <option value="Mid Level">Mid Level</option>
                            <option value="Senior Level">Senior Level</option>
                        </select>
                    </div>

                    <button id="btn-apply-filters" type="submit" class="btn btn-primary btn-block" style="margin-bottom:.5rem;">
                        Apply Filters
                    </button>
                    <a th:href="@{/jobs}" class="btn btn-outline btn-block">Clear All</a>
                </form>
            </div>
        </aside>

        <!-- ── JOB LISTINGS ── -->
        <div style="display: flex; flex-direction: column; gap: 1rem;">

            <!-- Result count -->
            <p class="text-sm text-muted" th:if="${!#lists.isEmpty(jobs)}"
               th:text="${#lists.size(jobs)} + ' jobs found'"></p>

            <div th:each="job, iterStat : ${jobs}"
                 class="job-row"
                 th:style="'animation-delay:' + ${iterStat.index * 0.06} + 's'">
                <div class="info">
                    <div class="co" th:text="${job.employer.name}">Company</div>
                    <h3 th:text="${job.title}">Job Title</h3>
                    <div class="meta">
                        <span>📍 <span th:text="${job.location}">Remote</span></span>
                        <span>💼 <span th:text="${job.experience}">Mid Level</span></span>
                        <span>💰 <span th:text="'$' + ${#numbers.formatDecimal(job.salary, 0, 'COMMA', 0, 'POINT')}">$100k</span></span>
                        <span class="badge badge-category" th:text="${job.category}" style="margin-left:.25rem;">Engineering</span>
                    </div>
                </div>
                <a th:href="@{/jobs/{id}(id=${job.id})}"
                   class="btn btn-outline btn-sm" style="white-space:nowrap;">Apply Now →</a>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(jobs)}" class="empty-state">
                <div class="empty-icon">🔍</div>
                <h3>No jobs found</h3>
                <p>Try adjusting your filters or check back later for new opportunities.</p>
                <a th:href="@{/jobs}" class="btn btn-outline mt-3">Clear Filters</a>
            </div>

        </div>
    </div>

</div>
</body>
</html>
