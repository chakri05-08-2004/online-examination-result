<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Sign In — CareerFlow')}">
<body>
<div th:fragment="content">

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Logo -->
            <div class="auth-logo">
                <span class="logo">⚡ CareerFlow</span>
            </div>

            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your account to continue</p>

            <!-- Error / Logout alerts -->
            <div th:if="${param.error}" class="alert alert-error">
                ⚠️ &nbsp;Invalid email or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                ✅ &nbsp;You've been signed out successfully.
            </div>

            <form th:action="@{/login}" method="post" style="margin-top: 1.5rem;">

                <div class="form-group">
                    <label class="form-label" for="login-email">Email address</label>
                    <input id="login-email"
                           type="email"
                           name="username"
                           class="form-control"
                           placeholder="you@example.com"
                           autocomplete="email"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input id="login-password"
                           type="password"
                           name="password"
                           class="form-control"
                           placeholder="••••••••"
                           autocomplete="current-password"
                           required>
                </div>

                <button id="btn-signin"
                        type="submit"
                        class="btn btn-primary btn-block"
                        style="margin-top: 1.25rem; padding: .75rem;">
                    Sign In →
                </button>
            </form>

            <hr class="divider">

            <p class="auth-footer">
                Don't have an account?
                <a th:href="@{/register}">Create one free</a>
            </p>
        </div>
    </div>

</div>
</body>
</html>
